# Air configuration file for Windows
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  # Binary path with .exe extension for Windows
  bin = "tmp\\main.exe"
  # Build command with .exe extension
  cmd = "go build -o .\\tmp\\main.exe cmd\\server\\main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", "bin", ".git", ".idea", ".vscode"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  # Empty full_bin - let air run the binary directly
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  include_file = []
  # Kill delay for graceful shutdown
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  # Send interrupt signal for graceful shutdown
  send_interrupt = false
  stop_on_error = false

[color]
  app = "cyan"
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "blue"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true